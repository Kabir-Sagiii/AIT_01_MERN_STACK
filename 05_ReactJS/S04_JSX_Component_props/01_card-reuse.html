<!doctype html>
<html>
  <head>
    <style>
      .container {
        display: flex;
        justify-content: space-evenly;
      }
      #card-container {
        width: 200px;
        text-align: center;
        box-shadow: 0 0 10px black;
        padding: 5px;
        margin: 20px;
      }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="text/babel">
      function createCard(image, title) {
        return (
          <div id="card-container">
            <img src={image} width="200" height="200" />
            <h3>{title}</h3>
          </div>
        );
      }

      function cardContainer() {
        return (
          <div className="container">
            {createCard(
              "https://cdn.pixabay.com/photo/2017/03/14/11/41/perfume-2142824_1280.jpg",
              "Perfume",
            )}
            {createCard(
              "https://tse3.mm.bing.net/th/id/OIP.GU-gRNeR9CKEluaTq4iahQHaJr?rs=1&pid=ImgDetMain&o=7&rm=3",
              "Trending",
            )}
            {createCard(
              "https://tse3.mm.bing.net/th/id/OIP.idnC7ckfIJ1s-hD4TAmxdAHaKX?rs=1&pid=ImgDetMain&o=7&rm=3",
              "30% off",
            )}
            {createCard(
              "https://tse1.mm.bing.net/th/id/OIP.sSlng3EPZBJxq_mEuJhWGAHaFL?rs=1&pid=ImgDetMain&o=7&rm=3",
              "20% off",
            )}
          </div>
        );
      }

      ReactDOM.render(cardContainer(), document.getElementById("root"));
    </script>
  </body>
</html>
