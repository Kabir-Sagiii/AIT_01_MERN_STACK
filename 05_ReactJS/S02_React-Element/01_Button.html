<!doctype html>
<html>
  <head>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  </head>

  <body>
    <div id="root"></div>

    <script>
      //React JS code
      var button_React_Element = React.createElement(
        "button",
        null,
        "React Button",
      );

      //Add React Element in the DOM
      ReactDOM.render(button_React_Element, document.getElementById("root"));
    </script>
  </body>
</html>
