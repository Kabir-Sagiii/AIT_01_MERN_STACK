<!doctype html>
<html>
  <head>
    <style>
      #box {
        width: 100px;
        height: 100px;
        box-shadow: 0 0 10px black;
        transition-property: transform;
        transition-duration: 3s;
        transition-delay: 0.5s;
        margin: 100px auto;
      }

      #box:hover {
        background-color: red;
        /* transform: translate(200px, 300px); */
        /* transform: scale(0.5); */
        transform: rotateX(-180deg);
      }
    </style>
  </head>

  <body>
    <div id="box"></div>
  </body>
</html>
