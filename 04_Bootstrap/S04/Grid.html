<!doctype html>
<html>
  <head>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>

  <body>
    <h1 class="text-success m-3">Grid in Bootstrap</h1>

    <div class="container bg-dark">
      <div class="row bg-primary">
        <div class="col bg-primary">Col1</div>
        <div class="col bg-success">Col2</div>
        <div class="col bg-info">Col3</div>
        <div class="col bg-dark">Col4</div>
        <div class="col bg-primary">Col1</div>
        <div class="col bg-success">Col2</div>
        <div class="col bg-info">Col3</div>
        <div class="col bg-dark">Col4</div>
        <div class="col bg-primary">Col1</div>
        <div class="col bg-success">Col2</div>
        <div class="col bg-info">Col3</div>
        <div class="col bg-dark">Col4</div>
      </div>

      <div class="row bg-secondary">
        <div class="col bg-danger">1</div>
        <div class="col bg-warning">2</div>
      </div>
      <div class="row bg-primary">
        <div class="col bg-primary">1</div>
        <div class="col bg-success">2</div>
        <div class="col bg-info">3</div>
      </div>
      <div class="row bg-secondary">
        <div class="col-3 bg-danger">1</div>
        <div class="col-7 bg-warning">2</div>
        <div class="col-2 bg-dark">3</div>
      </div>
    </div>

    <div class="container-fluid bg-primary my-5">
      <div class="row bg-primary">Row 1</div>
      <div class="row bg-secondary">Row 2</div>
      <div class="row bg-primary">Row 3</div>
      <div class="row bg-secondary">Row 4</div>
    </div>
  </body>
</html>
